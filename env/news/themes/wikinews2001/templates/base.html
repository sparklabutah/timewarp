<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wikinews - The Free News Source{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="/">
                    <span class="logo-icon">📰</span>
                    <span class="logo-text">Wikinews</span>
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/browse" class="nav-link">Browse</a>
            </nav>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search news..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="header-actions">
                <button id="randomBtn" class="btn-random">Random article</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>Wikinews - The Free News Source. All content is available under the Creative Commons Attribution 2.5 License.</p>
            <p>This is a local reader interface using a Wikinews XML dump.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
