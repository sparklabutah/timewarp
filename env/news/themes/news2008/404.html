{% extends "base.html" %}

{% block title %}Article Not Found - News{% endblock %}

{% block content %}
<br>
<table width="100%" border="0" cellpadding="0" cellspacing="0">
<tr><td>
    <font size="4" face="Arial, Helvetica, sans-serif" color="#BB1919"><b>Article Not Found</b></font>
    <br><br>
    <font size="2" face="Arial, Helvetica, sans-serif" style="line-height: 1.6;">
    The article "{{ title }}" could not be found in our news archive.
    </font>
    <br><br><br>
    <font size="2" face="Arial, Helvetica, sans-serif">
    <a href="/" style="color: #FFFFFF; background-color: #0066CC; padding: 8px 16px; text-decoration: none; border-radius: 3px; font-weight: bold;">Go to home</a>
    &nbsp;&nbsp;
    <a href="/browse" style="color: #0066CC; border: 1px solid #0066CC; padding: 7px 16px; text-decoration: none; border-radius: 3px;">Browse articles</a>
    &nbsp;&nbsp;
    <button id="randomError" style="color: #0066CC; border: 1px solid #0066CC; padding: 7px 16px; background-color: #FFFFFF; cursor: pointer; border-radius: 3px; font-size: 11px; font-family: Arial, Helvetica, sans-serif;">Random article</button>
    </font>
</td></tr>
</table>
<br><br>

<script>
// Random article button
document.getElementById('randomError').addEventListener('click', function() {
    fetch('/random')
        .then(response => response.json())
        .then(data => {
            if (data.title) {
                window.location.href = `/news/${encodeURIComponent(data.title)}`;
            }
        });
});
</script>
{% endblock %}
