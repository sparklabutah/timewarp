{% extends "base.html" %}

{% block title %}Article Not Found - News{% endblock %}

{% block content %}
<table width="100%" border="0" cellpadding="0" cellspacing="0">
<tr><td>
<font size="4" face="Arial, Helvetica, sans-serif"><b>Article Not Found</b></font>
<br><br>
<font size="2" face="Arial, Helvetica, sans-serif" color="#000000">
The article "{{ title }}" could not be found in our news archive.
</font>
<br><br>

<font size="2" face="Arial, Helvetica, sans-serif">
<a href="/" style="color: #0066CC;">Go to home</a> | 
<a href="/browse" style="color: #0066CC;">Browse articles</a> | 
<a href="#" id="randomError" style="color: #0066CC;">Random article</a>
</font>
<br><br>
<hr size="1" color="#cccccc">
<br>

<font size="2" face="Arial, Helvetica, sans-serif" color="#000000">
<b>Try searching for what you're looking for:</b>
</font>
<br><br>

<table border="0" cellpadding="0" cellspacing="0">
<tr>
<td>
<form action="/search" method="get" style="display: inline;">
<input type="text" name="q" id="errorSearch" size="30" style="font-size: 13px; padding: 4px;" placeholder="Search news..." autocomplete="off">
<input type="submit" value="Go" style="font-size: 13px; padding: 4px 8px; margin-left: 3px;">
</form>
</td>
</tr>
</table>

<div id="errorSearchResults"></div>
</td></tr>
</table>

<script>
// Random article button
document.getElementById('randomError').addEventListener('click', function() {
    fetch('/random')
        .then(response => response.json())
        .then(data => {
            if (data.title) {
                window.location.href = `/news/${encodeURIComponent(data.title)}`;
            }
        });
});

// Search functionality
const errorSearch = document.getElementById('errorSearch');
const errorSearchResults = document.getElementById('errorSearchResults');
let searchTimeout;

errorSearch.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const query = this.value.trim();
    
    if (query.length < 2) {
        errorSearchResults.style.display = 'none';
        return;
    }
    
    searchTimeout = setTimeout(() => {
        fetch(`/search?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(results => {
                if (results.length > 0) {
                    errorSearchResults.innerHTML = '<br><table border="0" cellpadding="5" cellspacing="0">' + results.map(result => `
                        <tr>
                            <td>
                                <font size="2" face="Arial, Helvetica, sans-serif">
                                    <a href="/news/${encodeURIComponent(result.title)}" style="color: #0066CC; text-decoration: none;">
                                        <b>${result.title}</b>
                                    </a>
                                    ${result.date ? `<br><font size="1" color="#666666">${result.date}</font>` : ''}
                                </font>
                            </td>
                        </tr>
                    `).join('') + '</table>';
                    errorSearchResults.style.display = 'block';
                } else {
                    errorSearchResults.innerHTML = '<br><font size="2" face="Arial, Helvetica, sans-serif" color="#000000">No results found</font>';
                    errorSearchResults.style.display = 'block';
                }
            });
    }, 300);
});

// Close results when clicking outside
document.addEventListener('click', function(e) {
    if (!errorSearch.contains(e.target) && !errorSearchResults.contains(e.target)) {
        errorSearchResults.style.display = 'none';
    }
});
</script>
{% endblock %}
