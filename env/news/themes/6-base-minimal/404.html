{% extends "base.html" %}

{% block title %}Article Not Found - News{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-content">
        <div class="error-icon">📰</div>
        <h1 class="error-title">Article Not Found</h1>
        <p class="error-message">
            The article "{{ title }}" could not be found in our news archive.
        </p>
        <div class="error-actions">
            <a href="/" class="btn-primary">Go to home</a>
            <a href="/browse" class="btn-secondary">Browse articles</a>
            <button id="randomError" class="btn-secondary">Random article</button>
        </div>
    </div>
</div>

<script>
// Random article button
document.getElementById('randomError').addEventListener('click', function() {
    fetch('/random')
        .then(response => response.json())
        .then(data => {
            if (data.title) {
                window.location.href = `/news/${encodeURIComponent(data.title)}`;
            }
        })
        .catch(error => {
            console.error('Random article error:', error);
        });
});
</script>
{% endblock %}
