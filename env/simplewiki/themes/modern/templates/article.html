{% extends "base.html" %}

{% block title %}{{ title }} - WikiReader{% endblock %}

{% block content %}
<div class="article-container">
    <article class="article-card">
        <header class="article-header">
            <h1 class="article-title">{{ title }}</h1>
            {% if timestamp %}
            <div class="article-meta">
                <span class="meta-icon">🕐</span>
                <span>Last updated: {{ timestamp.split('T')[0] }}</span>
            </div>
            {% endif %}
        </header>

        <div class="article-body">
            {{ content|safe }}
        </div>

        <footer class="article-footer">
            <div class="article-actions">
                <button class="action-btn" onclick="window.history.back()">
                    <span>←</span> Back
                </button>
                <button class="action-btn" id="randomArticle">
                    <span>🎲</span> Random
                </button>
            </div>
        </footer>
    </article>

    <aside class="table-of-contents" id="toc">
        <div class="toc-header">
            <h3>Contents</h3>
        </div>
        <div id="tocList" class="toc-list"></div>
    </aside>
</div>

<script>
// Generate table of contents
const articleBody = document.querySelector('.article-body');
const tocList = document.getElementById('tocList');
const headings = articleBody.querySelectorAll('h2, h3');

if (headings.length > 0) {
    headings.forEach((heading, index) => {
        const id = `section-${index}`;
        heading.id = id;
        
        const item = document.createElement('a');
        item.href = `#${id}`;
        item.className = `toc-item toc-${heading.tagName.toLowerCase()}`;
        item.textContent = heading.textContent;
        item.addEventListener('click', function(e) {
            e.preventDefault();
            heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        
        tocList.appendChild(item);
    });
} else {
    document.getElementById('toc').style.display = 'none';
}

// Random article button
document.getElementById('randomArticle').addEventListener('click', function() {
    fetch('/random')
        .then(response => response.json())
        .then(data => {
            if (data.title) {
                window.location.href = `/wiki/${encodeURIComponent(data.title)}`;
            }
        });
});
</script>
{% endblock %}
