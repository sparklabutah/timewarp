<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WikiReader{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">📖</span>
                <span class="logo-text">WikiReader</span>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                <span class="theme-icon">🌙</span>
            </button>
        </div>

        <div class="sidebar-search">
            <input type="text" id="sidebarSearch" placeholder="Search articles..." autocomplete="off">
            <div id="sidebarSearchResults" class="sidebar-search-results"></div>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Home</span>
            </a>
            <a href="#" id="randomNav" class="nav-item">
                <span class="nav-icon">🎲</span>
                <span class="nav-text">Random</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <p>Simple Wikipedia Reader</p>
            <p class="version">Modern Theme v2.0</p>
        </div>
    </aside>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle">
        <span class="hamburger"></span>
    </button>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
